name: Release Windows app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Resolve tag
        id: version
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.tag }}'
          } else {
            '${{ github.ref_name }}'
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.Substring(1))" >> $env:GITHUB_OUTPUT

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.4"
          cache: true

      - name: Build and test package
        shell: pwsh
        run: .\tool\package_windows.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $zip = "dist/CherryTokenMonitor-$env:RELEASE_VERSION-windows-x64.zip"
          $hash = "$zip.sha256"
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $zip $hash --clobber
          } else {
            gh release create $env:RELEASE_TAG $zip $hash `
              --title "Cherry Token Monitor $env:RELEASE_TAG" `
              --generate-notes `
              --verify-tag
          }
